# Configuration partagée des clusters de job.
# Référencée par les jobs via job_cluster_key: default.

variables:
  spark_version:
    default: "15.4.x-scala2.12"
  node_type:
    default: Standard_DS3_v2

resources:
  clusters:
    default_job_cluster:
      cluster_name: "ai-job-scraper-cluster [${bundle.target}]"
      spark_version: ${var.spark_version}
      node_type_id: ${var.node_type}
      num_workers: 1
      autotermination_minutes: 30
      spark_env_vars:
        ANTHROPIC_API_KEY: "{{secrets/${var.secret_scope}/anthropic_api_key}}"
        OPENAI_API_KEY:    "{{secrets/${var.secret_scope}/openai_api_key}}"
        GEMINI_API_KEY:    "{{secrets/${var.secret_scope}/gemini_api_key}}"
        ADZUNA_APP_ID:     "{{secrets/${var.secret_scope}/adzuna_app_id}}"
        ADZUNA_APP_KEY:    "{{secrets/${var.secret_scope}/adzuna_app_key}}"
